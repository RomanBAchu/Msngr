<!DOCTYPE html>
<html>
<head>
    <title>SignalR Chat Test</title>

    <!-- Обязательный мета-тег для мобильных устройств -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        /* Базовые стили для мобильных */
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            padding: 0;
            background: #fff;
            color: #333;
        }

        h3 {
            text-align: center;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        h5 {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 5px;
            margin-bottom: 20px;
            color: #666;
        }

        .input-container {
            margin-bottom: 20px;
        }

        #messages {
            border: 1px solid #ccc;
            height: 45vh;
            min-height: 250px;
            overflow-y: auto;
            padding: 12px;
            margin-bottom: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            font-size: 14px;
        }

        input, textarea, button {
            box-sizing: border-box;
            padding: 16px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        /* Компактное поле для имени */
        #userInput {
            width: 100%;
            max-width: 300px; /* Максимальная ширина 300 px */
            margin: 8px auto; /* Центрирование */
            display: block; /* Для корректного центрирования */
        }

        textarea {
            width: 100%;
            min-height: 120px; /* Высота на 3 строки */
            resize: vertical; /* Разрешаем пользователю менять высоту */
            overflow-y: auto; /* Полоса прокрутки при необходимости */
        }

        button {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            min-height: 52px;
            font-weight: bold;
        }

        /* Стиль для подсвечивания поля при ошибке */
        .error-input {
            border-color: #dc3545;
            box-shadow: 0 0 5px rgba(220, 53, 69, 0.3);
        }
    </style>
</head>
<body>
    <h3>Добро пожаловать в Мессенджер Господина.</h3>
    <h5>Пока такой вот чат. Зато есть название - АМБЕ, это как Апле, впервых рядах по списку.</h5>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Тя как звать то?" value="" />
        <textarea id="messageInput" placeholder="Рассказывай" rows="3"></textarea>
        <button onclick="sendTestMessage()">Отправить</button>
    </div>

    <div id="messages"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.0/signalr.min.js"></script>

    <script>
        let connection;

        function connectToHub() {
            const hubUrl = window.location.origin + "/chathub";

            console.log("Пытаюсь подключиться к:", hubUrl);

            connection = new signalR.HubConnectionBuilder()
                .withUrl(hubUrl)
                .withAutomaticReconnect()
                .configureLogging(signalR.LogLevel.Information)
                .build();

            connection.on("ReceiveMessage", (user, message) => {
                const msgDiv = document.createElement("div");
                msgDiv.innerHTML = `<b>[${new Date().toLocaleTimeString()}] ${user}:</b> ${message}`;
                document.getElementById("messages").appendChild(msgDiv);
                document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
            });

            connection.on("UserJoined", (connectionId) => {
                console.log("К нам зашел новый бро: " + connectionId);
            });

            // Вместо отображения статуса — логируем в консоль
            connection.onclose(() => {
                console.log("Соединение потеряно. Будет попытка переподключения...");
            });

            connection.start()
                .then(() => {
                    console.log("Успешно подключились к серверу!");
                })
                .catch(err => {
                    console.error("Критическая ошибка подключения:", err);
                });
        }

        function sendTestMessage() {
            const userInput = document.getElementById("userInput");
            const messageInput = document.getElementById("messageInput");

            const user = userInput.value.trim();
            const message = messageInput.value.trim();

            // Проверка: имя обязательно для ввода
            if (!user) {
                // Подсвечиваем поле красным
                userInput.classList.add("error-input");
                alert("Сначала введите своё имя!");
                return; // Прерываем выполнение функции
            }

            // Убираем подсветку, если пользователь исправил ошибку
            userInput.classList.remove("error-input");

            // Проверка: сообщение не пустое
            if (!message) {
                alert("Введите сообщение!");
                return;
            }

            if (connection && connection.state === signalR.HubConnectionState.Connected) {
                connection.invoke("SendMessage", user, message)
                    .catch(err => console.error("Ошибка отправки:", err));
                messageInput.value = "";
            } else {
                // Если соединение потеряно — показываем предупреждение
                alert("Соединение с сервером потеряно. Попробуйте перезагрузить страницу.");
            }
        }

        window.onload = connectToHub;
    </script>
</body>
</html>
