<!DOCTYPE html>
<html>
<head>
    <title>SignalR Chat Test</title>
    <style>
        #messages {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            background: #f9f9f9; /* Добавил легкий фон */
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h2>Добро пожаловать в Мессенджер Господина</h2>

    <div>
        <input type="text" id="userInput" placeholder="Тя как звать то?" value="User1" />
        <input type="text" id="messageInput" placeholder="Рассказывай" />
        <button onclick="sendTestMessage()">Отправить</button>
    </div>

    <div id="status">Статус: не подключено</div>
    <div id="messages"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.0/signalr.min.js"></script>

    <script>
        let connection;

        function connectToHub() {
            // ==========================================
            // ГЛАВНОЕ ИЗМЕНЕНИЕ ТУТ:
            // window.location.origin сам поймет, где запущен сайт:
            // на localhost или на Render.
            // ==========================================
            const hubUrl = window.location.origin + "/chathub";

            console.log("Пытаюсь подключиться к:", hubUrl);

            connection = new signalR.HubConnectionBuilder()
                .withUrl(hubUrl)
                .withAutomaticReconnect() // Самый важный бонус: сам переподключится при сбое
                .configureLogging(signalR.LogLevel.Information)
                .build();

            connection.on("ReceiveMessage", (user, message) => {
                const msgDiv = document.createElement("div");
                msgDiv.innerHTML = `<b>[${new Date().toLocaleTimeString()}] ${user}:</b> ${message}`;
                document.getElementById("messages").appendChild(msgDiv);
                document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
            });

            // Слушаем события входа/выхода, которые ты прописал в ChatHub.cs
            connection.on("UserJoined", (connectionId) => {
                console.log("К нам зашел новый бро: " + connectionId);
            });

            connection.onclose(() => {
                document.getElementById("status").style.color = "red";
                document.getElementById("status").textContent = "Соединение потеряно";
            });

            connection.start()
                .then(() => {
                    document.getElementById("status").style.color = "green";
                    document.getElementById("status").textContent = "В сети";
                })
                .catch(err => {
                    document.getElementById("status").textContent = `Ошибка: ${err}`;
                    console.error("Критическая ошибка:", err);
                });
        }

        function sendTestMessage() {
            const user = document.getElementById("userInput").value;
            const message = document.getElementById("messageInput").value;

            if (connection && connection.state === signalR.HubConnectionState.Connected) {
                connection.invoke("SendMessage", user, message)
                    .catch(err => console.error("Ошибка отправки:", err));
                document.getElementById("messageInput").value = "";
            } else {
                alert("Погоди, чат еще не подключился к серверу!");
            }
        }

        window.onload = connectToHub;
    </script>
</body>
</html>
