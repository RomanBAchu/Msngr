<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMBE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <h3>АМБЕ</h3>
        <!-- Окно сообщений -->
        <div id="messages"></div>

        <!-- Зона ввода -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Твоё имя..." />
            <div class="controls">
                <textarea id="messageInput" placeholder="Напиши что-нибудь..." rows="3"></textarea>
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
