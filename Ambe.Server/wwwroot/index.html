<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SignalR Chat Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h3>Добро пожаловать в Мессенджер Господина.</h3>
    <h5>Пока такой вот чат. Зато есть название - АМБЕ, это как Апле, впервые рядах по списку.</h5>

    <div class="input-container">
        <input type="text" id="userInput" placeholder="Тя как звать то?" value="" />
        <textarea id="messageInput" placeholder="Рассказывай" rows="3"></textarea>
        <button id="sendBtn">Отправить</button>
    </div>

    <div id="messages"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.0/signalr.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
